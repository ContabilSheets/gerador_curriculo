<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerador de Currículo</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
body {
  font-family: "Times New Roman", serif;
  background: #eaeaea;
  padding: 20px;
}

.container {
  max-width: 900px;
  margin: auto;
  background: #fff;
  padding: 20px;
  border-radius: 8px;
}

input, textarea {
  width: 100%;
  padding: 8px;
  margin-bottom: 10px;
  border: 1px solid #ccc;
}

button {
  width: 100%;
  padding: 15px;
  background: #000;
  color: #fff;
  border: none;
  cursor: pointer;
}

/* CURRICULO */
#curriculo {
  display: none;
  width: 794px;
  padding: 40px;
  background: white;
  color: black;
}

.topo {
  display: flex;
  justify-content: space-between;
}

.foto {
  width: 130px;
  height: 150px;
  object-fit: cover;
  border: 1px solid #000;
}

.nome {
  font-size: 20px;
  font-weight: bold;
  text-transform: uppercase;
}

.section-title {
  margin-top: 20px;
  font-weight: bold;
  text-transform: uppercase;
}

hr {
  border: 1px solid black;
}

p {
  margin: 5px 0;
  white-space: pre-line;
}
</style>
</head>

<body>

<div class="container">
  <h2>Preencher Currículo</h2>

  <input id="nome" placeholder="NOME COMPLETO (MAIÚSCULO)">
  <input id="endereco" placeholder="Endereço: Rua, nº">
  <input id="bairro" placeholder="Bairro">
  <input id="cidade" placeholder="Cidade - Estado">
  <input id="telefone" placeholder="Telefone">
  <input id="email" placeholder="E-mail">

  <textarea id="objetivo" placeholder="Objetivo profissional"></textarea>

  <textarea id="formacao" placeholder="Formação escolar (uma por linha)"></textarea>

  <textarea id="experiencia" placeholder="Experiência profissional (igual modelo)"></textarea>

  <textarea id="cursos" placeholder="Cursos complementares"></textarea>

  <input type="file" id="foto" accept="image/*">

  <button onclick="gerarPDF()">Gerar Currículo em PDF</button>
</div>

<!-- CURRICULO -->
<div id="curriculo">

  <div class="topo">
    <div>
      <p class="nome" id="outNome"></p>
      <p id="outEndereco"></p>
      <p id="outBairro"></p>
      <p id="outCidade"></p>
      <p id="outTelefone"></p>
      <p id="outEmail"></p>
    </div>
    <img id="outFoto" class="foto">
  </div>

  <div class="section-title">OBJETIVO</div>
  <hr>
  <p id="outObjetivo"></p>

  <div class="section-title">FORMAÇÃO ESCOLAR</div>
  <hr>
  <p id="outFormacao"></p>

  <div class="section-title">EXPERIÊNCIA PROFISSIONAL</div>
  <hr>
  <p id="outExperiencia"></p>

  <div class="section-title">CURSOS COMPLEMENTARES</div>
  <hr>
  <p id="outCursos"></p>

</div>

<script>
function gerarPDF() {

  document.getElementById("outNome").innerText =
    document.getElementById("nome").value.toUpperCase();

  document.getElementById("outEndereco").innerText =
    "Endereço: " + document.getElementById("endereco").value;

  document.getElementById("outBairro").innerText =
    "Bairro: " + document.getElementById("bairro").value;

  document.getElementById("outCidade").innerText =
    "Cidade: " + document.getElementById("cidade").value;

  document.getElementById("outTelefone").innerText =
    "Telefone: " + document.getElementById("telefone").value;

  document.getElementById("outEmail").innerText =
    "E-mail: " + document.getElementById("email").value;

  document.getElementById("outObjetivo").innerText =
    document.getElementById("objetivo").value;

  document.getElementById("outFormacao").innerText =
    document.getElementById("formacao").value;

  document.getElementById("outExperiencia").innerText =
    document.getElementById("experiencia").value;

  document.getElementById("outCursos").innerText =
    document.getElementById("cursos").value;

  const file = document.getElementById("foto").files[0];

  if (!file) {
    alert("Selecione uma foto!");
    return;
  }

  const reader = new FileReader();

  reader.onload = function(e) {
    document.getElementById("outFoto").src = e.target.result;

    document.getElementById("curriculo").style.display = "block";

    const element = document.getElementById("curriculo");

    const opt = {
      margin: 0,
      filename: 'curriculo.pdf',
      image: { type: 'jpeg', quality: 1 },
      html2canvas: { scale: 3, useCORS: true },
      jsPDF: { unit: 'px', format: [794, 1123], orientation: 'portrait' }
    };

    html2pdf().set(opt).from(element).save();
  };

  reader.readAsDataURL(file);
}
</script>

</body>
</html>
