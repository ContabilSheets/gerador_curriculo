<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Currículo Profissional</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
* {
  box-sizing: border-box;
}

body {
  font-family: "Times New Roman", serif;
  background: #eaeaea;
  margin: 0;
  padding: 10px;
}

.container {
  max-width: 400px;
  margin: auto;
  background: #fff;
  padding: 15px;
  border-radius: 10px;
}

input, textarea {
  width: 100%;
  padding: 12px;
  margin-bottom: 10px;
  font-size: 14px;
  border: 1px solid #999;
  border-radius: 5px;
}

textarea {
  resize: vertical;
  min-height: 80px;
}

button.gerar {
  width: 100%;
  padding: 15px;
  background: black;
  color: white;
  border: none;
  font-size: 16px;
  border-radius: 5px;
}

/* BOTÃO FOTO */
.file-label {
  display: block;
  text-align: center;
  padding: 12px;
  background: #ddd;
  border-radius: 5px;
  cursor: pointer;
  margin-bottom: 10px;
}

.file-label input {
  display: none;
}

/* CNH */
.cnh-group {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px 20px;
}

/* CURRÍCULO */
#curriculo {
  display: none;
  width: 794px;
  height: 1123px;
  background: white;
  padding: 113px 75px 75px 113px;
}

.topo {
  display: flex;
  justify-content: space-between;
}

.info {
  width: 75%;
}

.foto-box {
  width: 3cm;
  height: 4cm;
  border: 1px solid black;
  overflow: hidden;
}

.foto-box img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.nome {
  font-weight: bold;
  text-transform: uppercase;
}

.section-title {
  margin-top: 20px;
  font-weight: bold;
}

hr {
  border: 1px solid black;
}

p {
  white-space: pre-line;
}
</style>
</head>

<body>

<div class="container">
  <h2>Preencher Currículo</h2>

  <input id="nome" placeholder="NOME COMPLETO" oninput="this.value = this.value.toUpperCase()">
  <input id="endereco" placeholder="Endereço">
  <input id="bairro" placeholder="Bairro">
  <input id="cidade" placeholder="Cidade - Estado">
  <input id="telefone" placeholder="Telefone">
  <input id="email" placeholder="E-mail">

  <textarea id="objetivo"></textarea>
  <textarea id="formacao" placeholder="Formação"></textarea>

  <!-- EXPERIÊNCIAS -->
  <h3>Experiência 1</h3>
  <input id="empresa1" placeholder="Empresa">
  <input id="cargo1" placeholder="Cargo">
  <input id="periodo1" placeholder="Período">

  <h3>Experiência 2</h3>
  <input id="empresa2" placeholder="Empresa">
  <input id="cargo2" placeholder="Cargo">
  <input id="periodo2" placeholder="Período">

  <h3>Experiência 3</h3>
  <input id="empresa3" placeholder="Empresa">
  <input id="cargo3" placeholder="Cargo">
  <input id="periodo3" placeholder="Período">

  <textarea id="cursos" placeholder="Cursos"></textarea>

  <!-- CNH -->
  <h3>Habilitação</h3>
  <div class="cnh-group">
    <label><input type="checkbox" value="A" class="cnh"> Cat. A</label>
    <label><input type="checkbox" value="B" class="cnh"> Cat. B</label>
    <label><input type="checkbox" value="C" class="cnh"> Cat. C</label>
    <label><input type="checkbox" value="D" class="cnh"> Cat. D</label>
    <label><input type="checkbox" value="E" class="cnh"> Cat. E</label>
    <label><input type="checkbox" value="ACC" class="cnh"> Cat. ACC</label>
  </div>

  <!-- FOTO -->
  <label class="file-label">
    Adicione a foto
    <input type="file" id="foto" accept="image/*">
  </label>

  <button class="gerar" onclick="gerarPDF()">Gerar PDF</button>
</div>

<div id="curriculo">
  <div class="topo">
    <div class="info">
      <p class="nome" id="outNome"></p>
      <p id="outEndereco"></p>
      <p id="outBairro"></p>
      <p id="outCidade"></p>
      <p id="outTelefone"></p>
      <p id="outEmail"></p>
      <p id="outCnh"></p>
    </div>

    <div class="foto-box">
      <img id="outFoto">
    </div>
  </div>

  <div class="section-title">EXPERIÊNCIA</div>
  <hr>
  <p id="outExperiencia"></p>
</div>

<script>
function gerarPDF(){

  outNome.innerText = nome.value;
  outEndereco.innerText = endereco.value;
  outBairro.innerText = bairro.value;
  outCidade.innerText = cidade.value;
  outTelefone.innerText = telefone.value;
  outEmail.innerText = email.value;

  // CNH
  let lista = [];
  document.querySelectorAll(".cnh:checked").forEach(c => {
    lista.push(c.value);
  });

  outCnh.innerText = lista.length ? "Cat. " + lista.join("/") : "";

  // EXPERIÊNCIA
  let exp = "";

  if(empresa1.value){
    exp += "Empresa: " + empresa1.value + "\n";
    exp += "Cargo: " + cargo1.value + "\n";
    exp += "Período: " + periodo1.value + "\n\n";
  }

  if(empresa2.value){
    exp += "Empresa: " + empresa2.value + "\n";
    exp += "Cargo: " + cargo2.value + "\n";
    exp += "Período: " + periodo2.value + "\n\n";
  }

  if(empresa3.value){
    exp += "Empresa: " + empresa3.value + "\n";
    exp += "Cargo: " + cargo3.value + "\n";
    exp += "Período: " + periodo3.value + "\n";
  }

  outExperiencia.innerText = exp;

  const file = foto.files[0];

  if(!file){
    alert("Adicione uma foto");
    return;
  }

  const reader = new FileReader();

  reader.onload = function(e){
    outFoto.src = e.target.result;

    curriculo.style.display = "block";

    outFoto.onload = function(){
      setTimeout(() => {
        html2pdf().set({
          margin: 0,
          filename: 'curriculo.pdf',
          image: { type: 'jpeg', quality: 1 },
          html2canvas: { scale: 2, useCORS: true },
          jsPDF: { unit: 'px', format: [794, 1123] }
        }).from(curriculo).save();
      }, 300);
    };
  };

  reader.readAsDataURL(file);
}
</script>

</body>
</html>
