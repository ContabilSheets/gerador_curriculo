<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Currículo Profissional</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
* {
  box-sizing: border-box;
}

body {
  font-family: "Times New Roman", serif;
  background: #eaeaea;
  margin: 0;
  padding: 10px;
}

.container {
  max-width: 400px;
  margin: auto;
  background: #fff;
  padding: 15px;
  border-radius: 10px;
}

input, textarea {
  width: 100%;
  padding: 12px;
  margin-bottom: 10px;
  font-size: 14px;
  border: 1px solid #999;
  border-radius: 5px;
}

button.gerar {
  width: 100%;
  padding: 15px;
  background: black;
  color: white;
  border: none;
  font-size: 16px;
  border-radius: 5px;
}

/* CNH EXATAMENTE COMO PEDIDO */
.cnh-linha {
  display: flex;
  justify-content: space-between;
  margin-bottom: 8px;
}

.cnh-item {
  display: flex;
  align-items: center;
  gap: 6px;
  width: 48%;
  font-size: 15px;
}

/* CURRÍCULO */
#curriculo {
  display: none;
  width: 794px;
  height: 1123px;
  background: white;
  padding: 113px 75px 75px 113px;
}

.topo {
  display: flex;
  justify-content: space-between;
}

.info {
  width: 75%;
}

.foto-box {
  width: 3cm;
  height: 4cm;
  border: 1px solid black;
  overflow: hidden;
}

.foto-box img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.nome {
  font-weight: bold;
  text-transform: uppercase;
}

.section-title {
  margin-top: 20px;
  font-weight: bold;
}

hr {
  border: 1px solid black;
}

p {
  margin: 5px 0;
  white-space: pre-line;
}
</style>
</head>

<body>

<div class="container">
  <h2>Preencher Currículo</h2>

  <input id="nome" placeholder="NOME COMPLETO" oninput="this.value = this.value.toUpperCase()">
  <input id="endereco" placeholder="Endereço">
  <input id="bairro" placeholder="Bairro">
  <input id="cidade" placeholder="Cidade - Estado">
  <input id="telefone" placeholder="Telefone">
  <input id="email" placeholder="E-mail">

  <textarea id="objetivo"></textarea>
  <textarea id="formacao" placeholder="Formação"></textarea>

  <h3>Habilitação</h3>

  <!-- LINHA 1 -->
  <div class="cnh-linha">
    <label class="cnh-item"><input type="checkbox" value="A" class="cnh"> Cat A</label>
    <label class="cnh-item"><input type="checkbox" value="D" class="cnh"> Cat D</label>
  </div>

  <!-- LINHA 2 -->
  <div class="cnh-linha">
    <label class="cnh-item"><input type="checkbox" value="B" class="cnh"> Cat B</label>
    <label class="cnh-item"><input type="checkbox" value="E" class="cnh"> Cat E</label>
  </div>

  <!-- LINHA 3 -->
  <div class="cnh-linha">
    <label class="cnh-item"><input type="checkbox" value="C" class="cnh"> Cat C</label>
    <label class="cnh-item"><input type="checkbox" value="ACC" class="cnh"> Cat ACC</label>
  </div>

  <input type="file" id="foto">
  <button class="gerar" onclick="gerarPDF()">Gerar PDF</button>
</div>

<div id="curriculo">
  <div class="topo">
    <div class="info">
      <p class="nome" id="outNome"></p>
      <p id="outEndereco"></p>
      <p id="outCidade"></p>
      <p id="outTelefone"></p>
      <p id="outEmail"></p>
      <p id="outCnh"></p>
    </div>

    <div class="foto-box">
      <img id="outFoto">
    </div>
  </div>
</div>

<script>
function gerarPDF(){

  outNome.innerText = nome.value;
  outEndereco.innerText = endereco.value;
  outCidade.innerText = cidade.value;
  outTelefone.innerText = telefone.value;
  outEmail.innerText = email.value;

  let lista = [];
  document.querySelectorAll(".cnh:checked").forEach(c => {
    lista.push(c.value);
  });

  outCnh.innerText = lista.length ? "Cat. " + lista.join("/") : "";

  const file = foto.files[0];
  if(!file){
    alert("Adicione uma foto");
    return;
  }

  const reader = new FileReader();

  reader.onload = function(e){
    outFoto.src = e.target.result;
    curriculo.style.display = "block";

    html2pdf().from(curriculo).save();
  };

  reader.readAsDataURL(file);
}
</script>

</body>
</html>
