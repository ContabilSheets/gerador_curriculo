<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Currículo Profissional</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
* {
  box-sizing: border-box;
}

body {
  font-family: "Times New Roman", serif;
  background: #eaeaea;
  margin: 0;
  padding: 10px;
}

/* FORMULÁRIO */
.container {
  max-width: 400px;
  margin: auto;
  background: #fff;
  padding: 15px;
  border-radius: 10px;
}

input, textarea {
  width: 100%;
  padding: 12px;
  margin-bottom: 10px;
  font-size: 14px;
  border: 1px solid #999;
  border-radius: 5px;
}

textarea {
  resize: vertical;
  min-height: 80px;
}

button.gerar {
  width: 100%;
  padding: 15px;
  background: black;
  color: white;
  border: none;
  font-size: 16px;
  border-radius: 5px;
}

/* FOTO */
.file-label {
  display: block;
  text-align: center;
  padding: 12px;
  background: #ddd;
  border-radius: 5px;
  cursor: pointer;
  margin-bottom: 10px;
}

.file-label input {
  display: none;
}

/* CNH */
.cnh-group {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px 20px;
}

/* CURRÍCULO (corrigido para mobile) */
#curriculo {
  visibility: hidden;
  position: absolute;
  left: -9999px;
  width: 100%;
  max-width: 794px;
  background: white;
  padding: 40px;
}

.topo {
  display: flex;
  justify-content: space-between;
}

.info {
  width: 75%;
}

/* FOTO 3x4 COM ENQUADRAMENTO CORRETO */
.foto-box {
  width: 30mm;
  height: 40mm;
  border: 1px solid black;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}

.foto-box img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: 50% 15%;
}

.nome {
  font-weight: bold;
  text-transform: uppercase;
}

.section-title {
  margin-top: 20px;
  font-weight: bold;
  text-transform: uppercase;
}

hr {
  border: 1px solid black;
}

p {
  white-space: pre-line;
}
</style>
</head>

<body>

<div class="container">
  <h2>Preencher Currículo</h2>

  <input id="nome" placeholder="NOME COMPLETO" oninput="this.value = this.value.toUpperCase()">
  <input id="endereco" placeholder="Endereço">
  <input id="bairro" placeholder="Bairro">
  <input id="cidade" placeholder="Cidade - Estado">
  <input id="telefone" placeholder="Telefone">
  <input id="email" placeholder="E-mail">

  <textarea id="objetivo">Atuar na Empresa, na área da saúde a fim de agregar conceitos práticos à minha formação, utilizando sempre os conhecimentos adquiridos. Proporcionando uma maior qualidade nos serviços oferecidos pela Empresa.</textarea>
 
  <h1>Formação</h1>
  <textarea id="formacao" placeholder="Formação"></textarea>

  <h3>Experiência 1</h3>
  <input id="empresa1">
  <input id="cargo1">
  <input id="periodo1">

  <h3>Experiência 2</h3>
  <input id="empresa2">
  <input id="cargo2">
  <input id="periodo2">

  <h3>Experiência 3</h3>
  <input id="empresa3">
  <input id="cargo3">
  <input id="periodo3">

  <h1>Cursos</h1>
  <textarea id="cursos" placeholder="Cursos"></textarea>

  <h3>Habilitação</h3>
  <div class="cnh-group">
    <label><input type="checkbox" value="Cat. A" class="cnh"> A</label>
    <label><input type="checkbox" value="Cat. B" class="cnh"> B</label>
    <label><input type="checkbox" value="Cat. C" class="cnh"> C</label>
    <label><input type="checkbox" value="Cat. D" class="cnh"> D</label>
    <label><input type="checkbox" value="Cat. E" class="cnh"> E</label>
    <label><input type="checkbox" value="Cat. ACC" class="cnh"> ACC</label>
  </div>

  <label class="file-label">
    Adicione a foto
    <input type="file" id="foto" accept="image/*">
  </label>

  <button class="gerar" onclick="gerarPDF()">Gerar PDF</button>
</div>

<div id="curriculo">

  <div class="topo">
    <div class="info">
      <p class="nome" id="outNome"></p>
      <p id="outEndereco"></p>
      <p id="outBairro"></p>
      <p id="outCidade"></p>
      <p id="outTelefone"></p>
      <p id="outEmail"></p>
      <p id="outCnh"></p>
    </div>

    <div class="foto-box">
      <img id="outFoto">
    </div>
  </div>

  <div class="section-title">OBJETIVO</div>
  <hr>
  <p id="outObjetivo"></p>

  <div class="section-title">FORMAÇÃO</div>
  <hr>
  <p id="outFormacao"></p>

  <div class="section-title">EXPERIÊNCIA</div>
  <hr>
  <p id="outExperiencia"></p>

  <div class="section-title">CURSOS</div>
  <hr>
  <p id="outCursos"></p>

</div>

<script>
async function gerarPDF(){

  outNome.innerText = nome.value;
  outEndereco.innerText = "Endereço: " + endereco.value;
  outBairro.innerText = "Bairro: " + bairro.value;
  outCidade.innerText = "Cidade: " + cidade.value;
  outTelefone.innerText = "Telefone: " + telefone.value;
  outEmail.innerText = "E-mail: " + email.value;

  let lista = [];
  document.querySelectorAll(".cnh:checked").forEach(c => lista.push(c.value));
  outCnh.innerText = lista.length ? "Cat. " + lista.join("/") : "";

  outObjetivo.innerText = objetivo.value;
  outFormacao.innerText = formacao.value;

  let exp = "";
  if(empresa1.value) exp += empresa1.value + " - " + cargo1.value + " (" + periodo1.value + ")\n\n";
  if(empresa2.value) exp += empresa2.value + " - " + cargo2.value + " (" + periodo2.value + ")\n\n";
  if(empresa3.value) exp += empresa3.value + " - " + cargo3.value + " (" + periodo3.value + ")";

  outExperiencia.innerText = exp;
  outCursos.innerText = cursos.value;

  const file = foto.files[0];
  if(!file){
    alert("Adicione uma foto");
    return;
  }

  const reader = new FileReader();

  reader.onload = function(e){
    outFoto.src = e.target.result;

    curriculo.style.visibility = "visible";
    curriculo.style.position = "static";

    outFoto.onload = async function(){

      await new Promise(r => setTimeout(r, 800));

      await html2pdf().set({
        margin: 10,
        filename: 'curriculo.pdf',
        image: { type: 'jpeg', quality: 1 },
        html2canvas: { scale: 2, useCORS: true, scrollY: 0 },
        jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
      }).from(curriculo).save();

      curriculo.style.visibility = "hidden";
      curriculo.style.position = "absolute";
      curriculo.style.left = "-9999px";
    };
  };

  reader.readAsDataURL(file);
}
</script>

</body>
</html>
