<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Currículo Profissional</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
body {
  font-family: "Times New Roman", serif;
  background: #eaeaea;
  padding: 20px;
}

.container {
  max-width: 900px;
  margin: auto;
  background: #fff;
  padding: 20px;
}

input, textarea {
  width: 100%;
  padding: 8px;
  margin-bottom: 10px;
}

button {
  width: 100%;
  padding: 15px;
  background: black;
  color: white;
  border: none;
  cursor: pointer;
}

/* CURRICULO */
#curriculo {
  display: none;
  width: 794px;
  padding: 40px;
  background: white;
}

.topo {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
}

.info {
  width: 75%;
}

.foto-box {
  width: 150px;
  height: 180px;
  border: 1px solid black;
  overflow: hidden; /* 🔥 trava a imagem dentro */
}

.foto-box img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.nome {
  font-size: 22px;
  font-weight: bold;
  text-transform: uppercase;
}

.section-title {
  margin-top: 20px;
  font-weight: bold;
  text-transform: uppercase;
}

hr {
  border: 1px solid black;
}

p {
  margin: 5px 0;
  white-space: pre-line;
}
</style>
</head>

<body>

<div class="container">
  <h2>Preencher Currículo</h2>

  <input id="nome" placeholder="NOME COMPLETO" oninput="this.value = this.value.toUpperCase()">
  <input id="endereco" placeholder="Endereço">
  <input id="bairro" placeholder="Bairro">
  <input id="cidade" placeholder="Cidade - Estado">
  <input id="telefone" placeholder="Telefone">
  <input id="email" placeholder="E-mail">

  <textarea id="objetivo" placeholder="Objetivo"></textarea>

  <textarea id="formacao" placeholder="Formação"></textarea>

  <!-- EXPERIÊNCIA SEPARADA -->
  <h3>Experiência 1</h3>
  <input id="empresa1" placeholder="Empresa">
  <input id="cargo1" placeholder="Cargo">
  <input id="periodo1" placeholder="Período">

  <h3>Experiência 2</h3>
  <input id="empresa2" placeholder="Empresa">
  <input id="cargo2" placeholder="Cargo">
  <input id="periodo2" placeholder="Período">

  <textarea id="cursos" placeholder="Cursos"></textarea>

  <input type="file" id="foto">

  <button onclick="gerarPDF()">Gerar PDF</button>
</div>

<!-- CURRICULO -->
<div id="curriculo">

  <div class="topo">
    <div class="info">
      <p class="nome" id="outNome"></p>
      <p id="outEndereco"></p>
      <p id="outBairro"></p>
      <p id="outCidade"></p>
      <p id="outTelefone"></p>
      <p id="outEmail"></p>
    </div>

    <div class="foto-box">
      <img id="outFoto">
    </div>
  </div>

  <div class="section-title">OBJETIVO</div>
  <hr>
  <p id="outObjetivo"></p>

  <div class="section-title">FORMAÇÃO ESCOLAR</div>
  <hr>
  <p id="outFormacao"></p>

  <div class="section-title">EXPERIÊNCIA PROFISSIONAL</div>
  <hr>
  <p id="outExperiencia"></p>

  <div class="section-title">CURSOS COMPLEMENTARES</div>
  <hr>
  <p id="outCursos"></p>

</div>

<script>
function gerarPDF() {

  document.getElementById("outNome").innerText =
    document.getElementById("nome").value;

  document.getElementById("outEndereco").innerText =
    "Endereço: " + document.getElementById("endereco").value;

  document.getElementById("outBairro").innerText =
    "Bairro: " + document.getElementById("bairro").value;

  document.getElementById("outCidade").innerText =
    "Cidade: " + document.getElementById("cidade").value;

  document.getElementById("outTelefone").innerText =
    "Telefone: " + document.getElementById("telefone").value;

  document.getElementById("outEmail").innerText =
    "E-mail: " + document.getElementById("email").value;

  document.getElementById("outObjetivo").innerText =
    document.getElementById("objetivo").value;

  document.getElementById("outFormacao").innerText =
    document.getElementById("formacao").value;

  // EXPERIÊNCIAS FORMATADAS
  let experiencia = "";

  if(document.getElementById("empresa1").value){
    experiencia += "Empresa: " + empresa1.value + "\n";
    experiencia += "Cargo: " + cargo1.value + "\n";
    experiencia += "Período: " + periodo1.value + "\n\n";
  }

  if(document.getElementById("empresa2").value){
    experiencia += "Empresa: " + empresa2.value + "\n";
    experiencia += "Cargo: " + cargo2.value + "\n";
    experiencia += "Período: " + periodo2.value + "\n";
  }

  document.getElementById("outExperiencia").innerText = experiencia;

  document.getElementById("outCursos").innerText =
    document.getElementById("cursos").value;

  const file = document.getElementById("foto").files[0];

  const reader = new FileReader();

  reader.onload = function(e) {
    document.getElementById("outFoto").src = e.target.result;

    document.getElementById("curriculo").style.display = "block";

    html2pdf().set({
      margin: 0,
      filename: 'curriculo.pdf',
      image: { type: 'jpeg', quality: 1 },
      html2canvas: { scale: 3 },
      jsPDF: { unit: 'px', format: [794, 1123] }
    }).from(document.getElementById("curriculo")).save();
  };

  if(file){
    reader.readAsDataURL(file);
  } else {
    alert("Adicione uma foto");
  }
}
</script>

</body>
</html>
