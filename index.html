<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Currículo Profissional</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
body {
  font-family: "Times New Roman", serif;
  background: #eaeaea;
  padding: 20px;
  transition: 0.3s;
}

/* SELETOR */
.modo {
  text-align: center;
  margin-bottom: 20px;
}

.modo button {
  margin: 5px;
  padding: 10px 20px;
  border: none;
  cursor: pointer;
  background: #000;
  color: #fff;
}

/* CONTAINER BASE */
.container {
  margin: auto;
  background: #fff;
  padding: 20px;
  transition: 0.3s;
}

/* NOTEBOOK */
.desktop .container {
  max-width: 900px;
}

/* CELULAR */
.mobile .container {
  max-width: 400px;
}

/* INPUTS */
input, textarea {
  width: 100%;
  padding: 8px;
  margin-bottom: 10px;
}

button.gerar {
  width: 100%;
  padding: 15px;
  background: black;
  color: white;
  border: none;
}

/* CURRICULO (A4 ABNT) */
#curriculo {
  display: none;
  width: 794px;
  height: 1123px;
  background: white;

  box-sizing: border-box;
  padding-top: 113px;
  padding-left: 113px;
  padding-right: 75px;
  padding-bottom: 75px;
}

.topo {
  display: flex;
  justify-content: space-between;
}

.info {
  width: 75%;
}

.foto-box {
  width: 150px;
  height: 180px;
  border: 1px solid black;
  overflow: hidden;
}

.foto-box img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.nome {
  font-weight: bold;
  text-transform: uppercase;
}

.section-title {
  margin-top: 20px;
  font-weight: bold;
  text-transform: uppercase;
}

hr {
  border: 1px solid black;
}

p {
  margin: 5px 0;
  white-space: pre-line;
}
</style>
</head>

<body class="desktop">

<!-- 🔥 SELETOR -->
<div class="modo">
  <button onclick="setModo('desktop')">💻 Notebook</button>
  <button onclick="setModo('mobile')">📱 Celular</button>
</div>

<div class="container">
  <h2>Preencher Currículo</h2>

  <input id="nome" placeholder="NOME COMPLETO" oninput="this.value = this.value.toUpperCase()">
  <input id="endereco" placeholder="Endereço">
  <input id="bairro" placeholder="Bairro">
  <input id="cidade" placeholder="Cidade - Estado">
  <input id="telefone" placeholder="Telefone">
  <input id="email" placeholder="E-mail">

  <textarea id="objetivo" placeholder="Objetivo"></textarea>
  <textarea id="formacao" placeholder="Formação"></textarea>

  <h3>Experiência 1</h3>
  <input id="empresa1" placeholder="Empresa">
  <input id="cargo1" placeholder="Cargo">
  <input id="periodo1" placeholder="Período">

  <h3>Experiência 2</h3>
  <input id="empresa2" placeholder="Empresa">
  <input id="cargo2" placeholder="Cargo">
  <input id="periodo2" placeholder="Período">

  <textarea id="cursos" placeholder="Cursos"></textarea>

  <input type="file" id="foto">

  <button class="gerar" onclick="gerarPDF()">Gerar PDF</button>
</div>

<!-- CURRICULO -->
<div id="curriculo">

  <div class="topo">
    <div class="info">
      <p class="nome" id="outNome"></p>
      <p id="outEndereco"></p>
      <p id="outBairro"></p>
      <p id="outCidade"></p>
      <p id="outTelefone"></p>
      <p id="outEmail"></p>
    </div>

    <div class="foto-box">
      <img id="outFoto">
    </div>
  </div>

  <div class="section-title">OBJETIVO</div>
  <hr>
  <p id="outObjetivo"></p>

  <div class="section-title">FORMAÇÃO ESCOLAR</div>
  <hr>
  <p id="outFormacao"></p>

  <div class="section-title">EXPERIÊNCIA PROFISSIONAL</div>
  <hr>
  <p id="outExperiencia"></p>

  <div class="section-title">CURSOS COMPLEMENTARES</div>
  <hr>
  <p id="outCursos"></p>

</div>

<script>
// 🔥 TROCAR MODO
function setModo(tipo){
  document.body.className = tipo;
}

// GERAR PDF
function gerarPDF(){

  outNome.innerText = nome.value;
  outEndereco.innerText = "Endereço: " + endereco.value;
  outBairro.innerText = "Bairro: " + bairro.value;
  outCidade.innerText = "Cidade: " + cidade.value;
  outTelefone.innerText = "Telefone: " + telefone.value;
  outEmail.innerText = "E-mail: " + email.value;

  outObjetivo.innerText = objetivo.value;
  outFormacao.innerText = formacao.value;

  let exp = "";

  if(empresa1.value){
    exp += "Empresa: " + empresa1.value + "\n";
    exp += "Cargo: " + cargo1.value + "\n";
    exp += "Período: " + periodo1.value + "\n\n";
  }

  if(empresa2.value){
    exp += "Empresa: " + empresa2.value + "\n";
    exp += "Cargo: " + cargo2.value + "\n";
    exp += "Período: " + periodo2.value + "\n";
  }

  outExperiencia.innerText = exp;
  outCursos.innerText = cursos.value;

  const file = foto.files[0];

  if(!file){
    alert("Adicione uma foto");
    return;
  }

  const reader = new FileReader();

  reader.onload = function(e){
    outFoto.src = e.target.result;

    curriculo.style.display = "block";

    html2pdf().set({
      margin: 0,
      filename: 'curriculo.pdf',
      image: { type: 'jpeg', quality: 1 },
      html2canvas: { scale: 3 },
      jsPDF: { unit: 'px', format: [794, 1123] }
    }).from(curriculo).save();
  };

  reader.readAsDataURL(file);
}
</script>

</body>
</html>
